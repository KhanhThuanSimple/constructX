spring:
  datasource:
    url: jdbc:mysql://localhost:3306/constructx_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-patch.sql
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  port: 8080
# Chat configuration
chat:
  rate-limit:
    max-messages: 30      # Maximum messages per window
    window-minutes: 1     # Time window in minutes

  # Message configuration
  message:
    max-length: 5000      # Maximum characters per message
    allowed-file-types:   # Allowed file types for attachments
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
    max-file-size: 10485760  # 10MB in bytes
jwt:
  secret: "constructx-super-secret-key-2025-at-least-256-bits-long-for-hs256"
  expiration: 86400000

# Grok AI Chatbot (xAI API)
grok:
  api:
    key: "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"          # Đặt XAI_API_KEY của bạn ở đây hoặc qua env var GROK_API_KEY
    url: "https://api.x.ai/v1/chat/completions"
  model: "grok-3-mini"
file:
  upload-dir: ./uploads
  base-url: http://localhost:8080/uploads
