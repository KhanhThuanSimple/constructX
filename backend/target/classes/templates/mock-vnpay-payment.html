<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock VNPay Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        
        .info-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            color: #666;
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
        }
        
        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        
        .note {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #92400e;
            margin-top: 20px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏦</div>
            <div class="title">Mock VNPay Payment</div>
            <div class="subtitle">Giả lập trang thanh toán VNPay</div>
        </div>
        
        <div class="info-box">
            <div class="info-row">
                <span class="info-label">Mã giao dịch:</span>
                <span class="info-value" id="txnRef">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Số tiền:</span>
                <span class="info-value" id="amount">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Nội dung:</span>
                <span class="info-value" id="orderInfo">-</span>
            </div>
        </div>
        
        <div class="amount" id="amountDisplay">0đ</div>
        
        <div class="button-group">
            <button class="btn btn-success" onclick="paymentSuccess()">
                ✓ Thanh toán thành công
            </button>
            <button class="btn btn-danger" onclick="paymentFailed()">
                ✗ Thanh toán thất bại
            </button>
        </div>
        
        <div class="note">
            💡 Đây là trang giả lập VNPay. Click nút để test chức năng nạp tiền.
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang xử lý...</p>
        </div>
    </div>
    
    <script>
        // Lấy parameters từ URL
        const params = new URLSearchParams(window.location.search);
        const vnp_TxnRef = params.get('vnp_TxnRef');
        const vnp_Amount = params.get('vnp_Amount');
        const vnp_OrderInfo = params.get('vnp_OrderInfo');
        const vnp_ReturnUrl = params.get('vnp_ReturnUrl');
        
        // Hiển thị thông tin
        document.getElementById('txnRef').textContent = vnp_TxnRef || '-';
        document.getElementById('orderInfo').textContent = vnp_OrderInfo || '-';
        
        if (vnp_Amount) {
            const amount = parseInt(vnp_Amount) / 100;
            document.getElementById('amount').textContent = amount.toLocaleString('vi-VN') + 'đ';
            document.getElementById('amountDisplay').textContent = amount.toLocaleString('vi-VN') + 'đ';
        }
        
        function paymentSuccess() {
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                const callbackUrl = `/mock-vnpay/callback-success?` +
                    `vnp_TxnRef=${vnp_TxnRef}` +
                    `&vnp_Amount=${vnp_Amount}` +
                    `&returnUrl=${encodeURIComponent(vnp_ReturnUrl)}`;
                
                window.location.href = callbackUrl;
            }, 1500);
        }
        
        function paymentFailed() {
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                const callbackUrl = `/mock-vnpay/callback-failed?` +
                    `vnp_TxnRef=${vnp_TxnRef}` +
                    `&returnUrl=${encodeURIComponent(vnp_ReturnUrl)}`;
                
                window.location.href = callbackUrl;
            }, 1500);
        }
    </script>
</body>
</html>
