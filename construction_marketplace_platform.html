
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Be Vietnam Pro', sans-serif;
  --font-display: 'Lexend', sans-serif;
  --primary: #1a4f3a;
  --primary-light: #2d7a5a;
  --primary-bg: #e8f5ee;
  --accent: #e8a020;
  --accent-bg: #fff8e6;
  --danger: #c94040;
  --danger-bg: #fef0f0;
  --info: #2060c0;
  --info-bg: #eaf0fc;
  --surface: var(--color-background-primary);
  --surface2: var(--color-background-secondary);
  --border: var(--color-border-tertiary);
  --border2: var(--color-border-secondary);
  --text1: var(--color-text-primary);
  --text2: var(--color-text-secondary);
  --text3: var(--color-text-tertiary);
  --radius: 10px;
  --radius-lg: 14px;
}

body { font-family: var(--font); background: transparent; }

.app { display: flex; height: 680px; overflow: hidden; border: 0.5px solid var(--border2); border-radius: var(--radius-lg); background: var(--surface2); }

/* SIDEBAR */
.sidebar { width: 220px; background: var(--primary); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-brand { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.12); }
.brand-name { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.role-tabs { display: flex; gap: 4px; padding: 12px 12px 0; }
.role-tab { flex: 1; padding: 5px 4px; font-size: 10px; font-family: var(--font); font-weight: 500; text-align: center; border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); background: transparent; transition: all 0.15s; }
.role-tab.active { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.4); }

.nav { padding: 8px 10px; flex: 1; overflow-y: auto; }
.nav-section { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; padding: 10px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 400; transition: all 0.12s; margin-bottom: 1px; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 500; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.9; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; }

.sidebar-user { padding: 12px; border-top: 1px solid rgba(255,255,255,0.12); }
.user-card { display: flex; align-items: center; gap: 10px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
.user-name { font-size: 12px; font-weight: 500; color: #fff; }
.user-role { font-size: 10px; color: rgba(255,255,255,0.5); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 14px 20px; background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 12px; }
.topbar-title { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--text1); flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-family: var(--font); font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text1); transition: all 0.12s; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-light); }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 14px; position: relative; }
.notif-dot { position: absolute; top: 5px; right: 5px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

.content { flex: 1; overflow-y: auto; padding: 18px 20px; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 600; color: var(--text1); font-family: var(--font-display); line-height: 1; }
.stat-change { font-size: 11px; margin-top: 4px; }
.up { color: #2a9a5a; } .down { color: var(--danger); }
.stat-icon { font-size: 18px; margin-bottom: 6px; }

/* CARDS GRID */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text1); }
.card-action { font-size: 11px; color: var(--primary-light); cursor: pointer; }

/* PROJECT LIST */
.project-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.project-item:last-child { border-bottom: none; }
.project-thumb { width: 40px; height: 40px; border-radius: 8px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.project-info { flex: 1; min-width: 0; }
.project-name { font-size: 13px; font-weight: 500; color: var(--text1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
.badge-green { background: #e6f5eb; color: #1a7a40; }
.badge-amber { background: var(--accent-bg); color: #9a6010; }
.badge-blue { background: var(--info-bg); color: #1a4fa0; }
.badge-red { background: var(--danger-bg); color: #a02020; }
.badge-gray { background: var(--surface2); color: var(--text2); }

/* PROGRESS */
.progress-wrap { margin-top: 6px; }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--primary-light); }

/* BID CARDS */
.bid-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; position: relative; }
.bid-card.winner { border-color: var(--primary-light); border-width: 1.5px; }
.bid-winner-tag { position: absolute; top: -8px; left: 12px; background: var(--primary); color: #fff; font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.bid-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bid-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--primary); flex-shrink: 0; }
.bid-company { font-size: 13px; font-weight: 500; color: var(--text1); }
.bid-rating { font-size: 11px; color: var(--accent); }
.bid-price { font-size: 20px; font-weight: 700; color: var(--primary); font-family: var(--font-display); }
.bid-price-label { font-size: 11px; color: var(--text2); }
.bid-row { display: flex; gap: 8px; margin-top: 8px; }

/* ESCROW TRACKER */
.escrow-stages { display: flex; gap: 0; position: relative; margin: 16px 0 10px; }
.escrow-stage { flex: 1; text-align: center; position: relative; }
.stage-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border2); margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); position: relative; z-index: 1; transition: all 0.3s; }
.stage-dot.done { background: var(--primary); border-color: var(--primary); color: #fff; }
.stage-dot.active { background: #fff; border-color: var(--primary-light); color: var(--primary); box-shadow: 0 0 0 4px var(--primary-bg); }
.stage-line { position: absolute; top: 14px; left: calc(50% + 14px); right: calc(-50% + 14px); height: 2px; background: var(--border2); z-index: 0; }
.stage-line.done { background: var(--primary); }
.stage-label { font-size: 10px; color: var(--text2); line-height: 1.3; }
.stage-label.done { color: var(--primary); font-weight: 500; }
.stage-label.active { color: var(--text1); font-weight: 500; }
.stage-amount { font-size: 10px; color: var(--text3); }

/* CHAT */
.chat-messages { height: 220px; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.mine { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--primary); flex-shrink: 0; }
.msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; background: var(--surface2); color: var(--text1); }
.msg.mine .msg-bubble { background: var(--primary); color: #fff; }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; }
.chat-input-row { display: flex; gap: 8px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.chat-input { flex: 1; padding: 8px 12px; font-size: 12px; border-radius: 8px; border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text1); font-family: var(--font); outline: none; }

/* PRODUCTION LOG */
.log-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-img { width: 56px; height: 56px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; overflow: hidden; }
.log-info { flex: 1; }
.log-title { font-size: 12px; font-weight: 500; color: var(--text1); }
.log-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.log-time { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* MARKETPLACE */
.market-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.market-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.market-title { font-size: 13px; font-weight: 500; color: var(--text1); }
.market-budget { font-size: 15px; font-weight: 600; color: var(--primary); font-family: var(--font-display); }
.market-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
.market-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 0.5px solid var(--border); }

/* EARNINGS */
.earnings-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.earning-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
.earning-icon { font-size: 20px; margin-bottom: 8px; }
.earning-label { font-size: 11px; color: var(--text2); }
.earning-value { font-size: 20px; font-weight: 600; font-family: var(--font-display); color: var(--text1); margin-top: 2px; }

/* DISPUTE */
.dispute-card { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
.dispute-header { padding: 12px 14px; background: var(--danger-bg); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.dispute-title { font-size: 13px; font-weight: 500; color: #a02020; }
.dispute-body { padding: 14px; }
.dispute-row { display: flex; gap: 10px; }
.dispute-party { flex: 1; padding: 10px; background: var(--surface2); border-radius: 8px; border: 0.5px solid var(--border); }
.party-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.party-name { font-size: 12px; font-weight: 500; color: var(--text1); }
.party-claim { font-size: 11px; color: var(--text2); margin-top: 4px; }
.dispute-evidence { margin-top: 10px; }

/* ADMIN CHART */
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 0 4px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--primary-bg); transition: all 0.3s; }
.bar.active-bar { background: var(--primary-light); }
.bar-label { font-size: 9px; color: var(--text3); }

/* VENDOR */
.vendor-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.vendor-item:last-child { border-bottom: none; }
.vendor-logo { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; border: 0.5px solid var(--border); }
.vendor-info { flex: 1; }
.vendor-name { font-size: 13px; font-weight: 500; color: var(--text1); }
.vendor-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.vendor-actions { display: flex; gap: 6px; }

/* NOTIF */
.notif-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
.notif-item:last-child { border-bottom: none; }
.notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.notif-content { flex: 1; }
.notif-text { font-size: 12px; color: var(--text1); line-height: 1.4; }
.notif-text b { font-weight: 500; }
.notif-time { font-size: 10px; color: var(--text3); margin-top: 3px; }
.notif-unread .notif-text { color: var(--text1); }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--font); transition: all 0.12s; }
.filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.filter-chip:hover:not(.active) { background: var(--surface2); }

/* PORTFOLIO */
.portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.portfolio-item { border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); }
.portfolio-img { height: 80px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.portfolio-info { padding: 8px 10px; background: var(--surface); }
.portfolio-title { font-size: 11px; font-weight: 500; color: var(--text1); }
.portfolio-meta { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>

<h2 class="sr-only">Nền tảng thị trường xây dựng — giao diện đa vai trò cho khách hàng, nhà thầu và quản trị viên</h2>

<div class="app" id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">

      <div class="brand-sub">Sàn thi công nội thất</div>

      <div class="role-tab active" onclick="switchRole('customer')">KH</div>

<script>
const state = { role: 'customer', page: 'dashboard' };

const navs = {
  customer: [
    { id: 'dashboard', icon: '⊞', label: 'Tổng quan', badge: null },
    { id: 'create-project', icon: '✦', label: 'Tạo dự án', badge: null },
    { id: 'bidding', icon: '📋', label: 'Quản lý báo giá', badge: '3' },
    { id: 'project-detail', icon: '🏗', label: 'Chi tiết dự án', badge: null },
    { id: 'payment', icon: '💳', label: 'Thanh toán & Ví', badge: null },
    { id: 'notifications', icon: '🔔', label: 'Thông báo', badge: '5' },
    { id: 'chat', icon: '💬', label: 'Tin nhắn', badge: '2' },
  ],
  contractor: [
    { id: 'marketplace', icon: '🏪', label: 'Sàn dự án', badge: null },
    { id: 'submit-bid', icon: '📝', label: 'Gửi báo giá', badge: null },
    { id: 'work-orders', icon: '🔧', label: 'Quản lý đơn hàng', badge: '1' },
    { id: 'production-log', icon: '📸', label: 'Nhật ký sản xuất', badge: null },
    { id: 'earnings', icon: '💰', label: 'Ví nhà thầu', badge: null },
    { id: 'portfolio', icon: '🖼', label: 'Portfolio', badge: null },
    { id: 'chat', icon: '💬', label: 'Tin nhắn', badge: '3' },
  ],
  admin: [
    { id: 'admin-dashboard', icon: '⊞', label: 'Tổng quan hệ thống', badge: null },
    { id: 'vendor-verify', icon: '✅', label: 'Phê duyệt đối tác', badge: '7' },
    { id: 'dispute', icon: '⚖', label: 'Trung tâm tranh chấp', badge: '2' },
    { id: 'system-config', icon: '⚙', label: 'Cấu hình hệ thống', badge: null },
    { id: 'notifications', icon: '🔔', label: 'Thông báo', badge: null },
  ]
};

const primaryActions = {
  customer: { text: '+ Tạo dự án', page: 'create-project' },
  contractor: { text: '+ Gửi báo giá', page: 'submit-bid' },
  admin: { text: '+ Thêm danh mục', page: 'system-config' }
};

const users = {
  customer: { name: 'Nguyễn Lan', role: 'Khách hàng', initials: 'NL' },
  contractor: { name: 'Xưởng Minh Phú', role: 'Nhà thầu', initials: 'MP' },
  admin: { name: 'Admin Hệ thống', role: 'Quản trị viên', initials: 'AD' }
};

function switchRole(role) {
  state.role = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', ['customer','contractor','admin'][i] === role);
  });
  const u = users[role];
  document.getElementById('userAvatar').textContent = u.initials;
  document.getElementById('userName').textContent = u.name;
  document.getElementById('userRole').textContent = u.role;
  const pa = primaryActions[role];
  document.getElementById('primaryAction').textContent = pa.text;
  const firstPage = navs[role][0].id;
  state.page = firstPage;
  renderNav();
  renderContent();
}

function handlePrimary() {
  showPage(primaryActions[state.role].page);
}

function showPage(pageId) {
  state.page = pageId;
  renderNav();
  renderContent();
}

function renderNav() {
  const nav = navs[state.role];
  document.getElementById('nav').innerHTML = nav.map(item => `
    <div class="nav-item ${state.page === item.id ? 'active' : ''}" onclick="showPage('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      <span>${item.label}</span>
      ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
    </div>
  `).join('');
}

function renderContent() {
  const pages = { ...customerPages, ...contractorPages, ...adminPages, ...commonPages };
  const fn = pages[state.page];
  const el = document.getElementById('content');
  document.getElementById('pageTitle').textContent = navs[state.role].find(n=>n.id===state.page)?.label || '';
  el.innerHTML = fn ? fn() : `<div style="color:var(--text2);font-size:13px;padding:20px">Trang đang phát triển</div>`;
}

const customerPages = {
